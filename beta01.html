<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendario Ancestral Astronómico</title>
    <style>
        :root {
            --stone-color: #7d766d;
            --stone-shadow: #3a352f;
            --gold-accent: #d4af37;
        }

        body {
            margin: 0;
            padding: 0;
            background: radial-gradient(circle at center, #1a1a2e 0%, #000 100%);
            color: white;
            font-family: 'Georgia', serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Fondo de Estrellas */
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(1px 1px at 20px 30px, #eee, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 40px 70px, #fff, rgba(0,0,0,0)),
                radial-gradient(1.5px 1.5px at 100px 150px, #ddd, rgba(0,0,0,0));
            background-size: 200px 200px;
            opacity: 0.3;
            z-index: -1;
        }

        h1 {
            color: var(--gold-accent);
            text-shadow: 0 0 10px rgba(212, 175, 55, 0.5);
            margin-top: 20px;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        .controls {
            margin: 20px;
            background: rgba(0, 0, 0, 0.6);
            padding: 15px;
            border: 2px solid var(--stone-color);
            border-radius: 8px;
            box-shadow: 0 0 15px var(--stone-shadow);
        }

        input[type="date"] {
            background: #222;
            color: var(--gold-accent);
            border: 1px solid var(--stone-color);
            padding: 8px;
            cursor: pointer;
        }

        /* Contenedor de Engranajes */
        .gears-container {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-top: 50px;
            height: 500px;
            width: 100%;
        }

        .gear-wrapper {
            position: relative;
            border-radius: 50%;
            box-shadow: inset 0 0 50px rgba(0,0,0,0.8);
        }

        .gear {
            position: relative;
            border-radius: 50%;
            border: 15px solid var(--stone-color);
            box-sizing: border-box;
            background: repeating-conic-gradient(
                from 0deg,
                #555 0deg 10deg,
                #777 10deg 20deg
            );
            transition: transform 0.8s cubic-bezier(0.45, 0.05, 0.55, 0.95);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Estilo Piedra */
        .gear::after {
            content: "";
            position: absolute;
            top: -15px; left: -15px; right: -15px; bottom: -15px;
            border-radius: 50%;
            background: url('https://www.transparenttextures.com/patterns/rocky-wall.png');
            opacity: 0.4;
            pointer-events: none;
        }

        /* Engranaje 13 (Izquierdo) */
        #gear13 {
            width: 300px;
            height: 300px;
        }

        /* Engranaje 20 (Derecho) */
        #gear20 {
            width: 420px;
            height: 420px;
        }

        .tooth {
            position: absolute;
            width: 50px;
            height: 50px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .tooth img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            filter: drop-shadow(0 0 5px black);
        }

        /* Flechas */
        .nav-arrows {
            margin-top: 40px;
            display: flex;
            gap: 50px;
        }

        .arrow-btn {
            background: var(--stone-color);
            color: black;
            border: none;
            padding: 15px 30px;
            font-size: 24px;
            cursor: pointer;
            clip-path: polygon(25% 0%, 100% 50%, 25% 100%, 0% 50%);
            transition: transform 0.2s, background 0.3s;
            box-shadow: 0 5px 0 var(--stone-shadow);
        }

        .arrow-btn:active {
            transform: translateY(4px);
            box-shadow: 0 1px 0 var(--stone-shadow);
        }

        .arrow-left {
            transform: scaleX(-1);
        }

        .arrow-btn:hover {
            background: var(--gold-accent);
        }

        /* Indicador Central (donde se encuentran) */
        .marker {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -120%);
            font-size: 40px;
            color: var(--gold-accent);
            z-index: 10;
            text-shadow: 0 0 10px gold;
        }
    </style>
</head>
<body>

    <div class="stars"></div>

    <h1>Reloj Cósmico</h1>

    <div class="controls">
        <label>Fecha Terrestre: </label>
        <input type="date" id="datePicker">
    </div>

    <div class="gears-container">
        <div class="marker">▼</div>
        
        <div class="gear-wrapper">
            <div id="gear13" class="gear"></div>
        </div>

        <div class="gear-wrapper">
            <div id="gear20" class="gear"></div>
        </div>
    </div>

    <div class="nav-arrows">
        <button class="arrow-btn arrow-left" onclick="rotateGears(1)"></button>
        <button class="arrow-btn arrow-right" onclick="rotateGears(-1)"></button>
    </div>

    <script>
        const gear13 = document.getElementById('gear13');
        const gear20 = document.getElementById('gear20');
        const datePicker = document.getElementById('datePicker');

        let currentStep = 0;

        // Configuración inicial de fecha (Hoy)
        const today = new Date();
        datePicker.value = today.toISOString().split('T')[0];

        // Generar los dientes con imágenes
        function createTeeth(element, count, radius) {
            for (let i = 0; i < count; i++) {
                const angle = (i * 360) / count;
                const tooth = document.createElement('div');
                tooth.className = 'tooth';
                
                // Posicionamiento circular
                const x = radius * Math.cos((angle - 90) * Math.PI / 180);
                const y = radius * Math.sin((angle - 90) * Math.PI / 180);
                
                tooth.style.transform = `translate(${x}px, ${y}px) rotate(${angle}deg)`;
                
                // Espacio para tu PNG
                const img = document.createElement('img');
                // IMPORTANTE: Cambia estas URLs por tus archivos locales
                img.src = `https://via.placeholder.com/50/7d766d/ffffff?text=${i+1}`; 
                img.alt = `Símbolo ${i}`;
                
                tooth.appendChild(img);
                element.appendChild(tooth);
            }
        }

        // Inicializar engranajes
        createTeeth(gear13, 13, 110);
        createTeeth(gear20, 20, 170);

        function rotateGears(direction) {
            currentStep += direction;
            updateRotation();
        }

        function updateRotation() {
            // El engranaje de 13 gira 360/13 grados por paso
            const angle13 = currentStep * (360 / 13);
            // El engranaje de 20 gira 360/20 grados por paso
            // Se invierte o ajusta según la mecánica deseada
            const angle20 = currentStep * -(360 / 20);

            gear13.style.transform = `rotate(${angle13}deg)`;
            gear20.style.transform = `rotate(${angle20}deg)`;
        }

        // Sincronizar con el Input de Fecha
        datePicker.addEventListener('change', (e) => {
            const selectedDate = new Date(e.target.value);
            const diffTime = selectedDate - today;
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
            
            currentStep = diffDays;
            updateRotation();
        });

    </script>
</body>
</html>
